<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <a class="logo" href="">
            <img src="./images/LOGO.svg" alt="logo">
        </a>
        <nav class="menu-nav">
            <ul class="menu">
                <li class="menu-item"><a class="menu-link" href=""></a>Home</a></li>
                <li class="menu-item"><a class="menu-link" href=""></a>Episodes</a></li>
                <li class="menu-item"><a class="menu-link" href=""></a>About</a></li>
                <li class="menu-item"><a class="menu-link" href=""></a>Contact</a></li>
            </ul>
        </nav>
    </header>
    <section class="main-section">
        <div class="main-image">
            <img src="./images/IMAGE.png" alt="">
        </div>
        <div class="main">
            <h1 class="main-text">Take your podcast to the next level</h1>
            <span class="main-span">Listen on</span>
            <div class="main-items">
                <a class="main-link" href="">
                    <img class="main-link-image" src="./images/spotify.png" alt="spotify">
                </a>
                <a class="main-link" href="">
                    <img class="main-link-image" src="./images/radio1.png" alt="radio1">
                </a>
                <a class="main-link" href="">
                    <img class="main-link-image" src="./images/soundcloud.png" alt="soundcloud">
                </a>
                <a class="main-link" href="">
                    <img class="main-link-image" src="./images/radio2.png" alt="radio2">
                </a>
                <a class="main-link" href="">
                    <img class="main-link-image" src="./images/radio3.png" alt="radio3">
                </a>
            </div>
        </div>
    </section>
</body>
</html>
